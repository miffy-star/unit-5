        // ==========================================
        // 畫筆邏輯 (含 Undo 功能)
        // ==========================================
        let isDrawingMode = false;
        let isDrawing = false;
        let ctx;
        let paths = []; // 儲存所有的筆跡
        let currentPath = [];

        function resizeCanvas() {
            const canvas = document.getElementById('chalk-canvas');
            if (!canvas) return;
            canvas.width = document.documentElement.scrollWidth;
            canvas.height = document.documentElement.scrollHeight;
            redrawCanvas();
        }

        function toggleDrawingMode() {
            isDrawingMode = !isDrawingMode;
            const canvas = document.getElementById('chalk-canvas');
            const btn = document.getElementById('btn-draw');
            const undoBtn = document.getElementById('undo-btn');
            
            if (isDrawingMode) {
                resizeCanvas();
                canvas.style.pointerEvents = 'auto';
                document.getElementById('draw-text').innerText = '畫筆ON';
                btn.classList.add('bg-red-500', 'text-white');
                undoBtn.classList.remove('hidden');
                document.getElementById('draw-icon').setAttribute('data-lucide', 'pencil');
            } else {
                canvas.style.pointerEvents = 'none';
                document.getElementById('draw-text').innerText = '畫筆OFF';
                btn.classList.remove('bg-red-500', 'text-white');
                undoBtn.classList.add('hidden');
                document.getElementById('draw-icon').setAttribute('data-lucide', 'mouse-pointer-2');
            }
            lucide.createIcons();
        }

        function redrawCanvas() {
            if (!ctx) return;
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            ctx.strokeStyle = '#E63946';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            paths.forEach(path => {
                if (path.length < 2) return;
                ctx.beginPath();
                ctx.moveTo(path[0].x, path[0].y);
                for (let i = 1; i < path.length; i++) {
                    ctx.lineTo(path[i].x, path[i].y);
                }
                ctx.stroke();
            });
        }

        function undoLastStroke() {
            paths.pop();
            redrawCanvas();
        }

        function initChalkCanvas() {
            const canvas = document.getElementById('chalk-canvas');
            resizeCanvas();
            ctx = canvas.getContext('2d');
            window.addEventListener('resize', resizeCanvas);

            const getPos = (e) => {
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX + window.scrollX, y: clientY + window.scrollY };
            };

            const start = (e) => { if(!isDrawingMode) return; isDrawing=true; currentPath = [getPos(e)]; };
            const move = (e) => { 
                if(!isDrawing || !isDrawingMode) return; 
                if(e.touches) e.preventDefault();
                const p = getPos(e); 
                currentPath.push(p); 
                // 即時畫出
                ctx.strokeStyle = '#E63946';
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(currentPath[currentPath.length-2].x, currentPath[currentPath.length-2].y);
                ctx.lineTo(p.x, p.y);
                ctx.stroke();
            };
            const end = () => { if(isDrawing) { paths.push(currentPath); isDrawing=false; } };

            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', move);
            canvas.addEventListener('mouseup', end);
            canvas.addEventListener('touchstart', start, {passive: false});
            canvas.addEventListener('touchmove', move, {passive: false});
            canvas.addEventListener('touchend', end);
        }

                triggerConfetti();
            } else {
                msg.innerHTML = `<h2 class="text-[50px] font-black text-[#002FA7] mb-4">加油！再挑戰一次看看！💪</h2><p class="text-[32px] text-red-500 font-bold mb-4">Never give up! Practice makes perfect!</p><p class="text-[26px]">${name} 同學，老師相信你下次會進步更多！</p>`;
            }
            
            let reviewHtml = QUIZ_QUESTIONS.map((q, idx) => {
                if (quizAnswers[idx] !== q.ans) {
                    return `<div class="bg-white p-6 rounded-3xl border-4 border-red-200 font-bold text-[24px] shadow-sm"><p class="text-gray-500 mb-2">Q: ${q.q}</p><p class="text-red-500">❌ 你的答案：${q.options[quizAnswers[idx]]}</p><p class="text-green-600">✅ 正確答案：${q.options[q.ans]}</p></div>`;
                }
                return "";
            }).join("");
            document.getElementById('review-container').innerHTML = reviewHtml || "<p class='text-center text-green-600 font-bold text-[32px]'>全對！你簡直是英文小博士！</p>";
            window.scrollTo(0,0);
        }

        function resetQuizFlow() {
            quizAnswers = {};
            document.getElementById('student-id').value = "";
            document.getElementById('quiz-result-container').classList.add('hidden');
            document.getElementById('quiz-login-container').classList.remove('hidden');
            document.getElementById('btn-submit-quiz').disabled = false;
            document.getElementById('btn-submit-quiz').innerText = "交卷看成績 & 進後台！";
            setTimeout(resizeCanvas, 100);
        }

        function triggerConfetti() {
            const container = document.getElementById('confetti-container');
            container.innerHTML = '';
            const colors = ['#E63946', '#FFB703', '#2A9D8F', '#002FA7', '#FF69B4'];
            for (let i = 0; i < 200; i++) {
                const p = document.createElement('div');
                p.className = 'absolute w-4 h-10 opacity-80';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = '-20px';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.animation = `fall ${Math.random()*2+2}s linear ${Math.random()*0.6}s forwards`;
                container.appendChild(p);
            }
        }
    </script>
</body>
</html>
